<!DOCTYPE html>
<html>
<head>
    <style>
        #game {
            position: relative;
            width: 400px;
            height: 600px;
            border: 4px solid #333;
            background: #87CEEB;
            overflow: hidden;
        }

        .pipe {
            position: absolute;
            width: 60px;
            background: #2D5A27;
            border: 3px solid #1B3A19;
        }

        .pipe-top {
            top: 0;
            left: 150px;
            height: 200px;
        }

        .pipe-bottom {
            bottom: 0;
            left: 150px;
            height: 200px;
        }

        .pipe-cap {
            position: absolute;
            width: 70px;
            height: 25px;
            background: #558B2F;
            border: 3px solid #1B3A19;
            border-radius: 5px;
        }

        .pipe-top .pipe-cap {
            top: -25px;
            left: -8px;
        }

        .pipe-bottom .pipe-cap {
            bottom: -25px;
            left: -8px;
        }

        #bird {
            position: absolute;
            width: 50px;
            height: 50px;
            left: 80px;
            top: 250px;
            background: #FFD93D;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>管道测试页面</h1>
    <p>这是一个静态测试页面，用于验证管道是否能正常显示</p>
    
    <div id="game">
        <div id="bird"></div>
        
        <!-- 静态管道 -->
        <div class="pipe pipe-top">
            <div class="pipe-cap"></div>
        </div>
        
        <div class="pipe pipe-bottom">
            <div class="pipe-cap"></div>
        </div>
    </div>
</body>
</html>
